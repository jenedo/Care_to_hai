kind = "web"
previewPath = "/"
title = "AsaanCare Admin Panel"
version = "1.0.0"
id = "artifacts/admin-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20913

[services.development]
run = "pnpm --filter @asaancare/admin-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@asaancare/admin-dashboard", "run", "build" ]
publicDir = "artifacts/admin-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20913"
BASE_PATH = "/"
