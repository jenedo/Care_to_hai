kind = "mobile"
previewPath = "/doctor/"
title = "SahatGhar Doctor App"
version = "1.0.0"
id = "artifacts/doctor-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/doctor/" ]
localPort = 20229

[services.development]
run = "pnpm --filter @workspace/doctor-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/doctor-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/doctor-app", "run", "serve" ]

[services.env]
PORT = "20229"
BASE_PATH = "/doctor/"
